<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <!-- External Dependencies -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Application Styles -->
    <link href="styles/global.css" rel="stylesheet">
    <link href="styles/layout.css" rel="stylesheet">
    <link href="styles/components.css" rel="stylesheet">
    <link href="styles/modules.css" rel="stylesheet">
    <link href="styles/utilities.css" rel="stylesheet">
    <link href="styles/modal.css" rel="stylesheet">
</head>
<body>
    <div class="container hidden fade-in">
        <button class="close-button" id="main-close-button">
            <i class="fas fa-times"></i>
        </button>

        <div class="header">
            <div class="header-left">
                <div class="location-icon">
                    <i class="fas fa-industry"></i>
                </div>
                <div>
                    <h1 class="location-title" id="location-title">Verarbeitung</h1>
                    <div class="location-subtitle" id="location-subtitle">Wähle ein Rezept zum Verarbeiten</div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="recipes">
                    <i class="fas fa-book"></i>
                    <span data-locale="recipes">Rezepte</span>
                </div>
                <div class="tab" data-tab="orders">
                    <i class="fas fa-tasks"></i>
                    <span data-locale="active_orders">Aktive Aufträge</span>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="sidebar">
                <div class="filters">
                    <h3 class="filter-title" data-locale="filter">Filter</h3>
                    <div id="recipe-categories">
                        <div class="filter-option active" data-category="all">
                            <span data-locale="all_recipes">Alle Rezepte</span>
                            <i class="fas fa-check"></i>
                        </div>
                        <div class="filter-option" data-category="craftable">
                            <span data-locale="craftable">Herstellbar</span>
                            <i class="fas fa-check hidden"></i>
                        </div>
                    </div>
                </div>
            
                <div class="inventory-summary">
                    <h3 class="filter-title" data-locale="your_inventory">Dein Inventar</h3>
                    <div id="inventory-list" class="inventory-items">
                        <!-- Dynamically filled by InventoryManager -->
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div id="recipes-content" class="recipes-container">
                    <div class="recipe-grid" id="recipe-grid">
                        <!-- Dynamically filled by RecipeManager -->
                    </div>
                </div>

                <div id="orders-content" class="orders-container hidden">
                    <div class="active-orders" id="active-orders">
                        <!-- Dynamically filled by OrderManager -->
                    </div>
                </div>
            </div>
        </div>

        <div class="shortcut-hint">
            <i class="fas fa-keyboard"></i>
            <span data-locale="press_esc">ESC zum Schließen</span>
        </div>
    </div>

   <!-- Enhanced Modal Structure -->
<div class="modal" id="amount-modal">
    <div class="modal-header">
        <div class="modal-title">
            <h1 data-locale="select_amount">Menge auswählen</h1>
            <span class="modal-subtitle">Wähle die Menge die du herstellen möchtest</span>
        </div>
      
    </div>
    
    <div class="modal-content">
        <div id="recipe-preview" class="recipe-preview-container">
            <!-- Dynamically filled by ModalManager -->
        </div>
        
        <div class="amount-control">
            <button class="amount-adjust" id="amount-decrease">
                <i class="fas fa-minus"></i>
            </button>
            <input type="number" class="amount-input" id="amount-input" min="1" value="1">
            <button class="amount-adjust" id="amount-increase">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div id="resource-calculation" class="resource-calculation">
            <!-- Dynamically filled by ModalManager -->
        </div>
    </div>
    
    <div class="modal-footer">
        <button class="modal-button secondary" onclick="window.ModalManager.closeModal()">
            <i class="fas fa-times"></i>
            <span data-locale="cancel">Abbrechen</span>
        </button>
        <button class="modal-button" onclick="window.startCrafting()">
            <i class="fas fa-hammer"></i>
            <span data-locale="craft">Herstellen</span>
        </button>
    </div>
</div>

    <!-- Module imports -->
   <script type="module" src="js/main.js"></script>
</body>
</html>
